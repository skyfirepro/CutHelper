<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчеты производства</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            transition: background-color 0.3s, color 0.3s;
            color: #333;
            margin: 0px 5px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #f0f0f0;
            border-radius: 20px;
            box-shadow: 10px 10px 20px rgba(163, 163, 163, 0.4), -10px -10px 20px rgba(255, 255, 255, 0.8);
            width: 450px;
            transition: background-color 0.3s, color 0.3s;
            margin: 10px auto;
            padding: 20px;
            position: relative;
        }

        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-right: 45px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            background-color: #f0f0f0;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 4px 4px 8px rgba(163, 163, 163, 0.3), -4px -4px 8px rgba(255, 255, 255, 0.7);
            transition: all 0.2s;
            line-height: 1.2;
        }

        .tab-btn.active {
            box-shadow: inset 3px 3px 6px #babecc, inset -3px -3px 6px #fff;
            color: #007BFF;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #themeToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #b5b3b3;
            border: none;
            padding: 10px 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 6px 6px 12px rgba(163, 163, 163, 0.5), -6px -6px 12px rgba(255, 255, 255, 0.7);
            font-size: 18px;
            z-index: 10;
        }

        /* Исправленные заголовки с коротким подчеркиванием */
        .underlined-title {
            display: block;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        .underlined-title span {
            font-size: 1.1em;
            font-weight: bold;
            border-bottom: 2px solid #333;
            padding-bottom: 2px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }

        .form-label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            box-sizing: border-box;
            border: none;
            border-radius: 10px;
            background-color: #f0f0f0;
            color: #333;
            box-shadow: inset 5px 5px 10px #babecc, inset -5px -5px 10px #fff;
            font-size: 14px;
        }

        .form-input:disabled {
            background-color: #e0e0e0;
            color: #999;
            cursor: default;
            opacity: 0.6;
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 5px 5px 10px rgba(163, 163, 163, 0.4), -5px -5px 10px rgba(255, 255, 255, 0.8);
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        #resultsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.75em;
            display: none;
            table-layout: fixed;
        }

        #resultsTable th {
            background-color: #007BFF;
            color: white;
            padding: 8px 2px;
            border: 1px solid #fff;
        }

        #resultsTable td {
            padding: 8px 2px;
            border: 1px solid #ddd;
            text-align: center;
        }

        #shaftVisual {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            box-shadow: inset 4px 4px 8px #babecc, inset -4px -4px 8px #fff;
            margin-top: 15px;
        }

        body.dark-mode {
            background-color: #1e1e1e;
            color: #e0e0e0;
        }

        body.dark-mode .container {
            background-color: #1e1e1e;
            box-shadow: 10px 10px 20px #000, -10px -10px 20px #3c3c3c;
        }

        body.dark-mode .underlined-title span {
            border-bottom-color: #e0e0e0;
        }

        body.dark-mode .form-input,
        body.dark-mode .form-select {
            background-color: #1e1e1e;
            color: #e0e0e0;
            box-shadow: inset 5px 5px 10px #000, inset -5px -5px 10px #3c3c3c;
        }

        body.dark-mode #shaftVisual {
            background: #1e1e1e;
            box-shadow: inset 4px 4px 8px #000, inset -4px -4px 8px #3c3c3c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            padding: 25px;
            border-radius: 20px;
            background: #f0f0f0;
            text-align: center;
            width: 80%;
        }

        body.dark-mode .modal-content {
            background: #1e1e1e;
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab('rollsTab')">Количество <br> рулонов</button>
            <button class="tab-btn" onclick="openTab('shaftTab')">Раскрой</button>
        </div>

        <div id="rollsTab" class="tab-content active">
            <h2 style="text-align: center; color: #007BFF; font-size: 18px;">Расчет рулонов и остатка</h2>

            <div class="underlined-title"><span>Маточный рулон</span></div>

            <label class="form-label">Расстояние от шпули до края фольги (мм):</label>
            <input type="number" id="distanceToEdge" class="form-input">

            <div class="checkbox-container">
                <input type="checkbox" id="useRupture" onchange="toggleRuptureField()">
                <label for="useRupture">Рассчитать до порыва</label>
            </div>

            <label class="form-label">Расстояние от шпули до порыва (мм):</label>
            <input type="number" id="distanceToRupture" disabled class="form-input">

            <label class="form-label">Диаметр шпули маточного рулона (мм):</label>
            <input type="number" id="masterCore" value="660" class="form-input">

            <div class="underlined-title"><span>Намоточный рулон</span></div>

            <label class="form-label">Номинальный диаметр (мм):</label>
            <input type="number" id="targetOuter" class="form-input">

            <label class="form-label">Диаметр намоточной шпули (мм):</label>
            <select id="targetCoreSelector" class="form-select">
                <option value="81.2">81.2 (76.2 + 2.5)</option>
                <option value="158.4">158.4 (152.4 + 3)</option>
            </select>

            <label class="form-label">Коэффициент плотности</label>
            <input type="number" id="densityCorrection" value="0.98" step="0.01" class="form-input">

            <button class="calculate-btn" onclick="calculateRolls()">Рассчитать</button>
            <button class="reset-btn" onclick="showReset()">Сбросить данные</button>

            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Количество рулонов (шт)</th>
                        <th>Точное количество (шт)</th>
                        <th>Остаток на шпуле перед резкой (мм)</th>
                        <th>Остаток на шпуле после резки (мм)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="shaftTab" class="tab-content">
            <h2 style="text-align: center; color: #007BFF; font-size: 18px;">Расчет раскроя</h2>
            <label class="form-label">Ширина маточного рулона (мм):</label>
            <input type="number" id="masterWidth" class="form-input">

            <div class="checkbox-container">
                <input type="checkbox" id="useManualCount1" onchange="toggleManualInputs()">
                <label for="useManualCount1">Количество рулонов заказа №1</label>
            </div>
            <input type="number" id="manualCount1" disabled class="form-input" placeholder="Введите кол-во">

            <label class="form-label">Ширина заказа №1 (мм):</label>
            <input type="number" id="targetWidth1" class="form-input">

            <div class="checkbox-container">
                <input type="checkbox" id="useSecondOrder" onchange="toggleManualInputs()">
                <label for="useSecondOrder">2 заказ (дополнительный)</label>
            </div>

            <div class="checkbox-container" id="manualCount2Box" style="display:none;">
                <input type="checkbox" id="useManualCount2" onchange="toggleManualInputs()">
                <label for="useManualCount2">Количество рулонов заказа №2</label>
            </div>
            <input type="number" id="manualCount2" disabled class="form-input" placeholder="Введите кол-во">

            <label class="form-label">Ширина заказа №2 (мм):</label>
            <input type="number" id="targetWidth2" disabled class="form-input">

            <label class="form-label">Кромка (слева, мм):</label>
            <input type="number" id="edgeWidth" value="10" class="form-input">

            <button class="calculate-btn" onclick="calculateShaft()">Рассчитать раскрой</button>

            <div id="shaftResult" style="margin-top: 25px; display: none;">
                <div class="underlined-title"><span>Результат раскроя:</span></div>
                <div id="shaftVisual"></div>
            </div>
        </div>

        <div id="modalReset" class="modal">
            <div class="modal-content">
                <p>Очистить все поля ввода?</p>
                <button class="calculate-btn" onclick="location.reload()">Да</button>
                <button class="reset-btn" onclick="closeReset()">Нет</button>
            </div>
        </div>
    </div>

    <script>
        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        }

        function toggleRuptureField() { document.getElementById('distanceToRupture').disabled = !document.getElementById('useRupture').checked; }

        function toggleManualInputs() {
            const use2 = document.getElementById('useSecondOrder').checked;
            document.getElementById('targetWidth2').disabled = !use2;
            document.getElementById('manualCount2Box').style.display = use2 ? 'flex' : 'none';
            document.getElementById('manualCount1').disabled = !document.getElementById('useManualCount1').checked;
            document.getElementById('manualCount2').disabled = !(use2 && document.getElementById('useManualCount2').checked);
        }

        function calculateRolls() {
            const dEdge = parseFloat(document.getElementById('distanceToEdge').value);
            const DTarget = parseFloat(document.getElementById('targetOuter').value);
            const dMaster = parseFloat(document.getElementById('masterCore').value);
            const kCorr = parseFloat(document.getElementById('densityCorrection').value);
            const dTargetCore = parseFloat(document.getElementById('targetCoreSelector').value);
            if (isNaN(dEdge) || isNaN(DTarget)) return;

            const tTable = document.getElementById('resultsTable');
            const tBody = document.getElementById('tableBody');
            tBody.innerHTML = ''; tTable.style.display = 'table';

            const DM_initial = dMaster + (2 * dEdge);
            const DM_final = document.getElementById('useRupture').checked ? dMaster + (2 * (parseFloat(document.getElementById('distanceToRupture').value) || 0)) : dMaster;
            const areaTarget = (Math.pow(DTarget, 2) - Math.pow(dTargetCore, 2)) / kCorr;
            const areaMaster = Math.pow(DM_initial, 2) - Math.pow(DM_final, 2);
            const totalExact = areaMaster / areaTarget;
            const fullRolls = Math.floor(totalExact);

            for (let i = fullRolls; i > 0; i--) {
                const made = fullRolls - i;
                const aBefore = areaMaster - (made * areaTarget);
                const aAfter = areaMaster - ((made + 1) * areaTarget);
                const distB = (Math.sqrt(aBefore + Math.pow(DM_final, 2)) - dMaster) / 2;
                const distA = (Math.sqrt(aAfter + Math.pow(DM_final, 2)) - dMaster) / 2;
                tBody.innerHTML += `<tr><td>${i}</td><td>${(totalExact - made).toFixed(2)}</td><td>${distB.toFixed(1)}</td><td>${distA.toFixed(1)}</td></tr>`;
            }
        }

        function calculateShaft() {
            const master = parseFloat(document.getElementById('masterWidth').value);
            const w1 = parseFloat(document.getElementById('targetWidth1').value);
            const edge = parseFloat(document.getElementById('edgeWidth').value) || 0;
            const use2 = document.getElementById('useSecondOrder').checked;
            const w2 = use2 ? parseFloat(document.getElementById('targetWidth2').value) : 0;
            if (isNaN(master) || isNaN(w1)) return;

            let curW = master - edge;
            let c1 = document.getElementById('useManualCount1').checked ? (parseInt(document.getElementById('manualCount1').value) || 0) : Math.floor(curW / w1);
            if (c1 * w1 > curW) c1 = Math.floor(curW / w1);
            const totalW1 = c1 * w1;
            curW -= totalW1;

            let c2 = 0;
            if (use2 && w2 > 0) {
                c2 = document.getElementById('useManualCount2').checked ? (parseInt(document.getElementById('manualCount2').value) || 0) : Math.floor(curW / w2);
                if (c2 * w2 > curW) c2 = Math.floor(curW / w2);
            }
            const totalW2 = c2 * w2;
            curW -= totalW2;

            document.getElementById('shaftResult').style.display = 'block';
            document.getElementById('shaftVisual').innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; justify-content: space-between;"><span>Заказ №1 (${w1} мм):</span> <strong>${c1} шт.</strong></div>
                    ${use2 ? `<div style="display: flex; justify-content: space-between;"><span>Заказ №2 (${w2} мм):</span> <strong>${c2} шт.</strong></div>` : ''}
                    <hr style="border:0; border-top:1px solid #ccc; opacity: 0.3;">
                    <div style="display: flex; justify-content: space-between;"><span>Кромка (слева):</span> <strong>${edge} мм</strong></div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: rgba(0, 123, 255, 0.15); border-radius: 8px;">
                        <span>Сумма рулонов:</span> <strong style="color: #007BFF;">${(totalW1 + totalW2).toFixed(1)} мм</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;"><span>Спутник (справа):</span> <strong>${curW.toFixed(1)} мм</strong></div>
                    <hr style="border:0; border-top:1px solid #ccc; opacity: 0.3;">
                    <div style="display: flex; justify-content: space-between;"><span>Общая ширина обрези:</span> <strong style="color: #dc3545;">${(edge + curW).toFixed(1)} мм</strong></div>
                </div>`;
        }

        function showReset() { document.getElementById('modalReset').style.display = 'flex'; }
        function closeReset() { document.getElementById('modalReset').style.display = 'none'; }
    </script>
</body>

</html>
